<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Verification | Spice & Saffron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="verification.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="top-bar">
    <div class="logo-sm">S&S</div>
    <div class="brand-sm">Spice & Saffron</div>
  </header>

  <main class="main-wrap">
    <div class="verify-card">
      <div class="verify-anim">
        <div class="pulse-ring"></div>
        <div class="verify-emoji">🧾</div>
      </div>
      <h1 class="verify-title">Order Placed!</h1>
      <p class="verify-sub">Our waiter is on the way to verify your order</p>

      <div class="status-row">
        <div class="status-step active">
          <div class="step-dot">✓</div>
          <span>Order Placed</span>
        </div>
        <div class="step-line"></div>
        <div class="status-step" id="stepVerify">
          <div class="step-dot">2</div>
          <span>Verification</span>
        </div>
        <div class="step-line"></div>
        <div class="status-step" id="stepPay">
          <div class="step-dot">3</div>
          <span>Payment</span>
        </div>
      </div>

      <div id="order-details" class="order-details">
        <div class="loading-state">
          <div class="loader-ring"></div>
          <span>Loading your order…</span>
        </div>
      </div>

      <p class="refresh-note">Auto-refreshing every 5 seconds…</p>
    </div>
  </main>

  <script src="verification.js"></script>
</body>
</html>
