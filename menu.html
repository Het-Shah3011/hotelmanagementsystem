<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu | Spice & Saffron</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="menu.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="logo-sm">S&S</div>
      <div>
        <div class="brand-sm">Spice & Saffron</div>
        <div class="table-badge">Table <span id="tableNoDisplay">--</span></div>
      </div>
    </div>
    <div class="cart-pill" id="cartPill" onclick="scrollToOrder()">
      <span>🛒</span>
      <span id="cartCount">0</span>
      <span class="cart-sep">·</span>
      <span id="cartTotal">₹0</span>
    </div>
  </header>

  <!-- CATEGORY NAV -->
  <nav class="cat-nav" id="catNav"></nav>

  <!-- MAIN CONTENT -->
  <main class="main-wrap">

    <!-- WAITER SERVICE CARD -->
    <section class="service-card">
      <h3 class="section-heading">🛎️ Need Assistance?</h3>
      <div class="service-grid">
        <button class="service-btn" onclick="callWaiterIssue('Table cleaning required')">
          <span class="s-icon">🧹</span>
          <span>Clean Table</span>
        </button>
        <button class="service-btn" onclick="callWaiterIssue('Water refill required')">
          <span class="s-icon">💧</span>
          <span>Water Refill</span>
        </button>
        <button class="service-btn" onclick="callWaiterIssue('Tissue paper required')">
          <span class="s-icon">🧻</span>
          <span>Tissue Paper</span>
        </button>
        <button class="service-btn" onclick="callWaiterIssue('Food spill cleanup required')">
          <span class="s-icon">🫧</span>
          <span>Food Spill</span>
        </button>
      </div>
    </section>

    <!-- MENU CONTAINER -->
    <div id="menu-container"></div>

    <!-- ORDER SUMMARY SECTION -->
    <section class="order-summary" id="orderSummary" style="display:none;">
      <h3 class="section-heading">🛒 Your Order</h3>
      <div id="orderList" class="order-list"></div>
      <div class="order-total-row">
        <span>Total</span>
        <span id="orderTotalDisplay">₹0</span>
      </div>
    </section>

    <!-- ACTION BUTTONS -->
    <div class="action-bar">
      <button class="action-btn btn-place" onclick="submitOrder()">
        <span>🧾</span> Place Order
      </button>
      <button class="action-btn btn-pay" onclick="goToPaymentPage()">
        <span>💳</span> Pay Now
      </button>
      <button class="action-btn btn-waiter" onclick="callWaiter()">
        <span>📞</span> Call Waiter
      </button>
    </div>

  </main>

  <!-- LOADER -->
  <div id="loaderOverlay" class="loader-overlay">
    <div class="loader-ring"></div>
    <p>Please wait…</p>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="menu.js"></script>
</body>
</html>
